version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    # Release cooldown: don't adopt a version published <7 days ago
    # (mitigates freshly-compromised releases).
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "all"
    groups:
      minor:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # TypeScript 7 is the native port and exposes no compiler API, so
      # typescript-eslint cannot support it (peer stays typescript <6.1.0).
      # Drop this once typescript-eslint/typescript-eslint#10940 closes.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    # Release cooldown: don't adopt a version published <7 days ago
    # (mitigates freshly-compromised releases).
    cooldown:
      default-days: 7
