version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    # Release cooldown: don't adopt a version published <7 days ago
    # (mitigates freshly-compromised releases).
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "all"
    groups:
      minor:
        update-types:
          - "minor"
          - "patch"
    # Release cooldown: don't adopt a version published <7 days ago
    # (mitigates freshly-compromised releases).
    cooldown:
      default-days: 7
