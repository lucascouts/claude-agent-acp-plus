name: Publish and Release
on:
  push:
    branches:
      - main

# Default to no permissions; each job requests exactly what it needs.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release # Optional: for enhanced security
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: release
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  bundle:
    name: Attach bundle to the GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write # gh release upload
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      # Flat bundle (no top-level dir) consumed by the bentoo overlay ebuild:
      # dist/ + production node_modules + package.json + README/LICENSE.
      - name: Build and upload bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${TAG_NAME#v}"
          stage="$(mktemp -d)"
          cp package.json package-lock.json README.md LICENSE "$stage/"
          cp -r dist "$stage/dist"
          (cd "$stage" && npm ci --omit=dev --loglevel=error && rm package-lock.json)
          tar -czf "claude-agent-acp-plus-${version}-bundle.tar.gz" \
            -C "$stage" package.json README.md LICENSE dist node_modules
          gh release upload "$TAG_NAME" "claude-agent-acp-plus-${version}-bundle.tar.gz"

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    environment: release # Optional: for enhanced security
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      # Provenance attestation via OIDC (trusted publishing); runner's LTS npm
      # is recent enough — installing an unpinned npm@latest at publish time
      # would itself be a supply-chain exposure.
      - run: npm publish --provenance
